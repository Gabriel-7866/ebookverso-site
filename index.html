<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>EbookVerso</title>

<style>

body{
font-family: Arial;
background:#0a0a0a;
color:white;
margin:0;
}

header{
background:#000;
padding:20px;
text-align:center;
font-size:28px;
color:#00f7ff;
}

.container{
padding:30px;
max-width:1000px;
margin:auto;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#00f7ff;
color:black;
cursor:pointer;
}

.login{
text-align:center;
margin-top:50px;
}

.books{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.book{
background:#111;
padding:15px;
border-radius:10px;
text-align:center;
}

.book img{
width:100%;
border-radius:8px;
}

.library{
margin-top:40px;
}

</style>
</head>

<body>

<header>
📚 EbookVerso
</header>

<div class="container">

<div class="login">

<h2>Entrar</h2>

<button>Entrar com Google</button>

<p>ou</p>

<input placeholder="Email"><br><br>
<input type="password" placeholder="Senha"><br><br>

<button>Criar conta</button>

</div>

<hr>

<h2>Biblioteca de Ebooks</h2>

<div class="books">

<div class="book">
<img src="https://picsum.photos/200/300">
<h3>Mentalidade Milionária</h3>
<p>R$19,90</p>
<button>Comprar</button>
</div>

<div class="book">
<img src="https://picsum.photos/200/301">
<h3>Aprenda Python</h3>
<p>R$24,90</p>
<button>Comprar</button>
</div>

<div class="book">
<img src="https://picsum.photos/200/302">
<h3>Produtividade Máxima</h3>
<p>R$14,90</p>
<button>Comprar</button>
</div>

</div>

<div class="library">

<h2>📖 Meus Livros</h2>

<ul>
<li>Mentalidade Milionária (comprado)</li>
</ul>

</div>

</div>

</body>
</html>
